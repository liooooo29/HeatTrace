name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            output: HeatTrace
            webkit: libwebkit2gtk-4.0-dev
            tags: webkit2_40
          - os: ubuntu-24.04
            platform: linux
            output: HeatTrace
            webkit: libwebkit2gtk-4.1-dev
            tags: webkit2_41
          - os: macos-latest
            platform: darwin
            output: HeatTrace.app
          - os: windows-latest
            platform: windows
            output: HeatTrace.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ${{ matrix.webkit }} \
            libx11-dev libx11-xcb-dev

      - name: Build
        if: matrix.platform != 'linux'
        run: wails build

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: wails build -tags ${{ matrix.tags }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: tar -czf HeatTrace-${{ matrix.os }}-amd64.tar.gz -C build/bin .

      - name: Package (macOS)
        if: matrix.platform == 'darwin'
        run: tar -czf HeatTrace-darwin-amd64.tar.gz -C build/bin .

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path build/bin/* -DestinationPath HeatTrace-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: HeatTrace-${{ matrix.os }}
          path: |
            HeatTrace-*.tar.gz
            HeatTrace-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
