name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            webkit: libwebkit2gtk-4.0-dev
            tags: webkit2_40
          - os: ubuntu-24.04
            platform: linux
            webkit: libwebkit2gtk-4.1-dev
            tags: webkit2_41
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-${{ matrix.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-${{ matrix.os }}-

      - name: Cache Wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-v2.12.0-${{ runner.os }}

      - name: Install Wails
        run: |
          if ! command -v wails &> /dev/null; then
            go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          fi

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ${{ matrix.webkit }} \
            libx11-dev libx11-xcb-dev libxkbcommon-x11-dev

      - name: Build
        if: matrix.platform != 'linux'
        run: wails build

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: wails build -tags ${{ matrix.tags }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: tar -czf HeatTrace-${{ matrix.os }}-amd64.tar.gz -C build/bin .

      - name: Package (macOS)
        if: matrix.platform == 'darwin'
        run: tar -czf HeatTrace-darwin-amd64.tar.gz -C build/bin .

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path build/bin/* -DestinationPath HeatTrace-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: HeatTrace-${{ matrix.os }}
          path: |
            HeatTrace-*.tar.gz
            HeatTrace-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
