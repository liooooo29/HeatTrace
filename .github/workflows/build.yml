name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            webkit: libwebkit2gtk-4.0-dev
            tags: webkit2_40
          - os: ubuntu-24.04
            platform: linux
            webkit: libwebkit2gtk-4.1-dev
            tags: webkit2_41
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ matrix.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ matrix.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Cache Wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: wails-v2.12.0-${{ runner.os }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ${{ matrix.webkit }} \
            libx11-dev libx11-xcb-dev libxkbcommon-x11-dev xvfb

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VER="${TAG#v}"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: matrix.platform != 'linux'
        run: wails build -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: xvfb-run wails build -tags ${{ matrix.tags }} -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          # Download appimagetool
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          # Create AppDir
          APP_DIR=build/AppDir
          mkdir -p "$APP_DIR/usr/bin" "$APP_DIR/usr/share/icons/hicolor/512x512/apps" "$APP_DIR/usr/share/applications"

          cp build/bin/HeatTrace "$APP_DIR/usr/bin/heattrace"
          chmod +x "$APP_DIR/usr/bin/heattrace"
          cp build/appicon.png "$APP_DIR/usr/share/icons/hicolor/512x512/apps/heattrace.png"

          printf '[Desktop Entry]\nName=HeatTrace\nExec=HeatTrace\nIcon=heattrace\nType=Application\nCategories=Utility;Development;\nComment=Desktop activity tracker for keyboard & mouse\nTerminal=false\nStartupNotify=false\n' > "$APP_DIR/usr/share/applications/heattrace.desktop"

          cp "$APP_DIR/usr/share/applications/heattrace.desktop" "$APP_DIR/heattrace.desktop"
          cp build/appicon.png "$APP_DIR/heattrace.png"
          ln -sf "usr/bin/heattrace" "$APP_DIR/AppRun"

          ./appimagetool "$APP_DIR" HeatTrace-${{ matrix.os }}-amd64.AppImage

          # Create .deb package
          DEB_VERSION="${{ steps.version.outputs.version }}"
          DEB_DIR="build/heattrace_${DEB_VERSION}_amd64"
          mkdir -p "$DEB_DIR/DEBIAN" "$DEB_DIR/usr/bin" "$DEB_DIR/usr/share/icons/hicolor/512x512/apps" "$DEB_DIR/usr/share/applications"

          cp build/bin/HeatTrace "$DEB_DIR/usr/bin/HeatTrace"
          chmod +x "$DEB_DIR/usr/bin/HeatTrace"
          cp build/appicon.png "$DEB_DIR/usr/share/icons/hicolor/512x512/apps/heattrace.png"
          cp "$APP_DIR/usr/share/applications/heattrace.desktop" "$DEB_DIR/usr/share/applications/heattrace.desktop"

          printf 'Package: heattrace\nVersion: %s\nArchitecture: amd64\nMaintainer: liooooo29 <1741196223@qq.com>\nDescription: Desktop activity tracker for keyboard & mouse\n HeatTrace monitors keyboard and mouse activity in real-time, providing heatmaps, typing analytics, and daily dashboards.\nSection: utils\nPriority: optional\n' "$DEB_VERSION" > "$DEB_DIR/DEBIAN/control"

          dpkg-deb --build "$DEB_DIR" "heattrace_${DEB_VERSION}_${{ matrix.os }}_amd64.deb"

      - name: Package (macOS)
        if: matrix.platform == 'darwin'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "HeatTrace" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "HeatTrace.app" 175 190 \
            --hide-extension "HeatTrace.app" \
            --app-drop-link 425 190 \
            "HeatTrace-darwin-amd64.dmg" \
            "build/bin/HeatTrace.app"

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path build/bin/* -DestinationPath HeatTrace-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: HeatTrace-${{ matrix.os }}
          path: |
            HeatTrace-*.AppImage
            HeatTrace-*.zip
            HeatTrace-*.dmg
            heattrace_*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
